<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async function() {
    await protectPage();
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Shiksha With Sagar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/student-dashboard.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="brand">📖 <span>SWS</span></div>
    <button onclick="logoutUser()">Logout</button>
</div>

<!-- PROFILE SECTION -->
<div class="profile-section">
    <div class="profile-avatar" id="dash-avatar">S</div>
    <div class="profile-text">
        <p class="time-greet" id="dash-greeting">Good Morning ☀️</p>
        <h2>Welcome back, <span id="dash-student-name">Student</span>!</h2>
        <p class="sub-text">Keep learning and stay consistent.</p>
    </div>
</div>

<!-- MOTIVATIONAL CARD -->
<div class="quote-card">
    <p class="quote-text" id="motivational-quote"></p>
</div>

<!-- STATS -->
<div class="stats-section">
    <div class="stat-card">
        <span id="stat-subjects">0</span>
        <small>Subjects</small>
    </div>
    <div class="stat-card">
        <span id="stat-chapters">0</span>
        <small>Chapters</small>
    </div>
    <div class="stat-card">
        <span id="stat-total-videos">0</span>
        <small>Videos</small>
    </div>
    <div class="stat-card">
        <span id="stat-total-notes">0</span>
        <small>Notes</small>
    </div>
</div>

<!-- SUBJECTS -->
<h3 class="section-title">📚 My Subjects</h3>
<div class="subjects-grid" id="subjects-grid"></div>

<!-- QUICK LINKS -->
<h3 class="section-title">⚡ Quick Actions</h3>
<div class="quick-grid">
    <a href="livestreams.html" class="quick-card">🔴<span>Live Class</span></a>
    <a href="study-material.html" class="quick-card">📄<span>All Notes</span></a>
    <a href="announcements.html" class="quick-card">📢<span>Updates</span></a>
</div>

<script src="./js/app-data.js"></script>
<script src="./js/student-dashboard.js"></script>
<script>initStudentDashboard();</script>

</body>
</html>
