<!DOCTYPE html>
<html>
<head>
    <title>Signup - Shiksha With Sagar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:sans-serif; padding:40px;">

<h2>Create Account</h2>

<form id="signup-form">
    <input type="email" id="signup-email" placeholder="Email" required><br><br>
    <input type="password" id="signup-password" placeholder="Password" required><br><br>
    <button type="submit">Sign Up</button>
</form>

<p>Already have an account? <a href="login.html">Login</a></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>

<script>
redirectIfLoggedIn();

document.getElementById("signup-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;

    const success = await signUpUser(email, password);

    if (success) {
        window.location.href = "login.html";
    }
});
</script>

</body>
</html>
