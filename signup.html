<!DOCTYPE html>
<html>
<head>
    
    <title>Signup - Shiksha With Sagar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:sans-serif; padding:40px;">

<h2>Create Account</h2>

<form id="signup-form">
    <input type="email" id="signup-email" placeholder="Email" required><br><br>
    <input type="password" id="signup-password" placeholder="Password" required><br><br>
    <button type="submit">Sign Up</button>
</form>

<p>Already have an account? <a href="login.html">Login</a></p>

<script>
document.addEventListener("DOMContentLoaded", function() {

    console.log("✅ DOM loaded (Signup Page)");

    // Check if already logged in
    if (typeof redirectIfLoggedIn === "function") {
        redirectIfLoggedIn();
    } else {
        console.error("❌ redirectIfLoggedIn not defined");
    }

    const form = document.getElementById("signup-form");

    if (!form) {
        console.error("❌ Signup form not found!");
        return;
    }

    console.log("✅ Signup form found");

    form.addEventListener("submit", async function(e) {

        e.preventDefault();
        console.log("✅ Signup form submitted");

        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;

        console.log("📧 Email entered:", email);

        try {
            const success = await signUpUser(email, password);

            console.log("Signup result:", success);

            if (success) {
                alert("Signup successful! Redirecting to login...");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            }

        } catch (err) {
            console.error("❌ Unexpected error during signup:", err);
            alert("Unexpected error occurred.");
        }

    });

});
</script>

</body>
</html>
