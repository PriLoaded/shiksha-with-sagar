<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a3e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shiksha With Sagar</title>

    <link rel="icon" type="image/png" href="./icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/splash.css">
</head>
<body>

    <!-- ══════════════════════════════════════════════
         SPLASH SCREEN CONTAINER
         ══════════════════════════════════════════════ -->
    <div class="splash-screen" id="splash-screen">

        <!-- Background animated particles -->
        <div class="particles" id="particles"></div>

        <!-- Glowing rings behind the image -->
        <div class="glow-rings">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
        </div>

        <!-- Main Content -->
        <div class="splash-content" id="splash-content">

            <!-- Teacher Image Section -->
            <div class="teacher-section">
                <div class="image-frame" id="image-frame">
                    <div class="image-border"></div>
                    <div class="teacher-image-wrapper">
                        <!-- ═══════════════════════════════════════════
                             OPTION A: SVG ILLUSTRATION (Default)
                             This is a built-in teacher illustration.
                             
                             OPTION B: YOUR OWN PHOTO
                             To use your real photo, replace everything
                             inside this div with:
                             <img src="./icons/teacher-photo.png" alt="Sagar Sir">
                             ═══════════════════════════════════════════ -->
                        <img src="./icons/teacher-photo.png" alt="Sagar Sir">
                    </div>

                    <!-- Verified badge -->
                    <div class="verified-badge">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="11" fill="#06d6a0"/>
                            <path d="M8 12.5L11 15.5L16.5 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <!-- Teacher name & thumbs-up label -->
                <div class="teacher-name" id="teacher-name">
                    <span class="wave-emoji">👋</span> Sagar Sir
                </div>
            </div>

            <!-- App Name -->
            <div class="app-name-section" id="app-name">
                <div class="app-icon-text">📖</div>
                <h1 class="app-title">
                    <span class="title-line-1">Shiksha</span>
                    <span class="title-line-2">With Sagar</span>
                </h1>
                <p class="app-tagline" id="tagline">Your Complete Learning Companion</p>
            </div>

            <!-- Loading Section -->
            <div class="loading-section" id="loading-section">
                <div class="loading-bar-container">
                    <div class="loading-bar" id="loading-bar"></div>
                </div>
                <p class="loading-text" id="loading-text">Preparing your lessons...</p>
            </div>

        </div>

        <!-- Bottom branding -->
        <div class="splash-footer" id="splash-footer">
            <p>Made with ❤️ for students</p>
            <p class="version-text">Version 2.0</p>
        </div>

    </div>

    <script src="./js/splash.js"></script>
</body>
</html>
