<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <title>Login - Shiksha With Sagar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:sans-serif; padding:40px;">

<h2>Login</h2>

<form id="login-form">
    <input type="email" id="login-email" placeholder="Email" required><br><br>
    <input type="password" id="login-password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="signup.html">Sign Up</a></p>


<script>
document.addEventListener("DOMContentLoaded", function() {

    redirectIfLoggedIn();

    const form = document.getElementById("signup-form");

    if (!form) {
        console.error("❌ Signup form not found!");
        return;
    }

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;

        const success = await signUpUser(email, password);

        if (success) {
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }
    });
});
</script>

</body>
</html>
