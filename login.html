<!DOCTYPE html>
<html>
<head>
    <title>Login - Shiksha With Sagar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<h2>Login</h2>

<form id="login-form">
    <input type="text" id="login-email" placeholder="Email or Username" required><br><br>
    <input type="password" id="login-password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("login-form");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;

        // Simple frontend demo login
        if (email && password) {
            localStorage.setItem("sws_user", JSON.stringify({
                email: email,
                name: email.split("@")[0],
                role: "student"
            }));

            window.location.href = "student-dashboard.html";
        } else {
            alert("Please enter email and password.");
        }
    });

});
</script>

</body>
</html>
