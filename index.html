<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a3e">
    <title>Shiksha With Sagar</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icons/icon-192x192.png">
    <script>
        // index.html is the PWA entry point
        // It always goes to splash first
        if (!sessionStorage.getItem('sws_splash_done')) {
            window.location.replace('splash.html');
        } else {
            // If splash already shown, check login status
            try {
                var user = JSON.parse(localStorage.getItem('sws_user'));
                if (user && user.role === 'student') {
                    window.location.replace('student-dashboard.html');
                } else if (user && user.role === 'admin') {
                    window.location.replace('admin/admin-dashboard.html');
                } else {
                    window.location.replace('login.html');
                }
            } catch(e) {
                window.location.replace('login.html');
            }
        }
    </script>
</head>
<body>
    <p style="text-align:center;padding:40px;font-family:sans-serif;color:#888">
        Redirecting...
    </p>
</body>
</html>
